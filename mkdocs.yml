      - AI policy and risk ownership: governance/ai-policy-and-risk-ownership.md
      - Trustee briefing and assurance: governance/trustee-briefing-and-assurance.md
      - Tool approval: governance/tool-approval.md
      - Supplier contracts and procurement: governance/supplier-contracts-and-procurement.md
      - Agents and connectors: governance/agents-and-connectors.md
      - Monitoring, audit and change control: governance/monitoring-audit-and-change-control.md
