site_name: AI Safe Charity Index
site_description: Practical, evidence-led guidance to help UK charities use AI safely, confidently and responsibly.
site_url: https://matthew-nel.github.io/AI-Safe-Charity-Index/
repo_url: https://github.com/matthew-nel/AI-Safe-Charity-Index
repo_name: matthew-nel/AI-Safe-Charity-Index

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
      - start-here/index.md
  - Before You Paste:
      - before-you-paste/index.md
  - AI and Data Protection:
      - Overview: ai-and-data-protection/index.md
      - DPIA triage for AI: ai-and-data-protection/dpia-triage.md
      - Automated decisions and profiling: ai-and-data-protection/automated-decisions.md
  - Everyday Charity Work:
      - Overview: everyday-charity-work/index.md
      - AI in fundraising: everyday-charity-work/ai-in-fundraising.md
      - Meetings and transcription: everyday-charity-work/meetings-and-transcription.md
  - Governance:
      - Overview: governance/index.md
      - Tool approval: governance/tool-approval.md
      - Agents and connectors: governance/agents-and-connectors.md
      - AI incidents: governance/incidents.md
  - Tools:
      - Overview: tools/index.md
      - Account plans and data controls: tools/account-plans-and-data-controls.md
      - ChatGPT: tools/chatgpt.md
      - Claude: tools/claude.md
      - Google Gemini: tools/google-gemini.md
      - Microsoft Copilot: tools/microsoft-copilot.md
      - Notion AI: tools/notion-ai.md
      - Perplexity: tools/perplexity.md
      - Canva AI: tools/canva-ai.md
      - Adobe Firefly: tools/adobe-firefly.md
  - Templates:
      - templates.md
  - Learning Paths:
      - learning-paths/index.md
  - Research and Community:
      - research-and-community/index.md
  - Updates:
      - updates/index.md
      - July 2026 research update: updates/2026-07.md
      - Changelog: updates/changelog.md
      - Roadmap: updates/roadmap.md
  - About:
      - about/index.md
      - FAQ: about/faq.md
      - Glossary: about/glossary.md
      - Contact: about/contact.md
      - Accessibility: accessibility/index.md
      - Privacy: privacy/index.md
