site_name: AI Safe Charity Index
site_description: Practical, evidence-led guidance to help UK charities use AI safely, confidently and responsibly.
site_url: https://matthew-nel.github.io/AI-Safe-Charity-Index/
repo_url: https://github.com/matthew-nel/AI-Safe-Charity-Index
repo_name: matthew-nel/AI-Safe-Charity-Index

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/risk-levels.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
      - start-here/index.md
  - Before You Paste:
      - before-you-paste/index.md
  - AI and Data Protection:
      - Overview: ai-and-data-protection/index.md
      - Lawful basis and transparency: ai-and-data-protection/lawful-basis-and-transparency.md
      - Special category, children and vulnerability: ai-and-data-protection/special-category-children-and-vulnerability.md
      - DPIA triage for AI: ai-and-data-protection/dpia-triage.md
      - Automated decisions and profiling: ai-and-data-protection/automated-decisions.md
      - Individual rights: ai-and-data-protection/individual-rights.md
      - Suppliers, transfers and contracts: ai-and-data-protection/suppliers-transfers-and-contracts.md
      - Retention, security and breaches: ai-and-data-protection/retention-security-and-breaches.md
  - Everyday Charity Work:
      - Overview: everyday-charity-work/index.md
      - Communications and public content: everyday-charity-work/communications-and-public-content.md
      - AI in fundraising: everyday-charity-work/ai-in-fundraising.md
      - Meetings and transcription: everyday-charity-work/meetings-and-transcription.md
      - Beneficiary services and chatbots: everyday-charity-work/beneficiary-services-and-chatbots.md
      - Safeguarding: everyday-charity-work/safeguarding.md
      - Recruitment and HR: everyday-charity-work/recruitment-and-hr.md
      - Volunteers: everyday-charity-work/volunteers.md
      - Finance, grants and fraud: everyday-charity-work/finance-grants-and-fraud.md
      - Research and evaluation: everyday-charity-work/research-and-evaluation.md
      - Translation, accessibility and inclusion: everyday-charity-work/translation-accessibility-and-inclusion.md
